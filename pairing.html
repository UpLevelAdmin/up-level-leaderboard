<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 Tournament Hub | Up Level Guild</title>

  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;400;600;700&family=Inter:wght@400;600;800&family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* ════════ Up Level Guild — deck theme (Tournament Hub, mobile-first) ════════ */
    :root{
      --cream:#FFFDF5; --cream2:#FFF7E6; --ink:#2D3142; --ink-soft:#7B7C95;
      --primary:#FF8C42; --orange:#FF8C42; --orange-soft:#FFEAD9; --grape:#B8B0FF; --grape-soft:#EFEBFF;
      --success:#0B6BA8; --accent:#FF8C42; --warning:#D97706; --danger:#B03A52;
      --sun:#FFE2B8; --line:rgba(45,49,66,.08); --line2:rgba(45,49,66,.05);
    }
    *{ box-sizing:border-box; -webkit-font-smoothing:antialiased; }
    body{ font-family:'Mitr','Kanit','Inter',sans-serif; color:var(--ink); margin:0; padding:0; min-height:100vh;
      overflow-x:hidden; line-height:1.55;
      background:
        radial-gradient(60vmax 60vmax at 88% -8%, #FFEEDD 0%, transparent 55%),
        radial-gradient(55vmax 55vmax at -8% 12%, #F1EDFF 0%, transparent 50%),
        var(--cream); }
    .app-container{ max-width:820px; margin:0 auto; padding:18px 16px 48px; position:relative; z-index:10; }

    header{ text-align:center; margin-bottom:22px; position:relative; padding:24px 18px;
      background:transparent; border:none; border-radius:0; box-shadow:none; }
    .back-home{ position:absolute; left:6px; top:22px; text-decoration:none; color:var(--ink-soft);
      font-size:.85rem; display:flex; align-items:center; gap:6px; transition:.2s; }
    .back-home:hover{ color:var(--orange); transform:translateX(-3px); }
    .logo-main{ width:60px; margin-bottom:10px; filter:drop-shadow(0 6px 12px rgba(45,49,66,.16)); }
    .title-group h1{ font-size:1.9rem; font-weight:600; margin:0; color:var(--ink);
      -webkit-text-fill-color:initial; background:none; letter-spacing:.2px; }
    .subtitle{ color:var(--ink-soft); font-size:.9rem; margin-top:.3rem; font-weight:300; }

    .action-bar{ display:flex; justify-content:center; gap:10px; margin-top:18px; flex-wrap:wrap; }
    .btn-action{ padding:.7rem 1.3rem; border-radius:14px; border:none; background:rgba(255,255,255,.6);
      color:var(--ink); font-family:inherit; font-weight:500; cursor:pointer; transition:.2s;
      display:flex; align-items:center; gap:8px; font-size:.86rem; }
    .btn-action:hover{ background:rgba(255,255,255,.85); transform:translateY(-2px); box-shadow:0 8px 18px -10px rgba(45,49,66,.35); }
    .btn-action.primary{ background:var(--orange); color:#fff; font-weight:600; box-shadow:0 8px 18px -10px var(--orange); }
    .btn-action.success{ background:var(--grape); color:#fff; }
    .btn-action.warning{ background:var(--cream2); color:var(--ink); border:1px solid var(--sun); }

    .tournament-card{ background:rgba(255,255,255,.6); border:1px solid var(--sun); border-radius:22px;
      padding:20px 16px; margin-bottom:18px; box-shadow:0 14px 40px -24px rgba(45,49,66,.45);
      backdrop-filter:blur(6px); animation:slideUp .5s ease-out forwards; opacity:0; }
    @keyframes slideUp{ from{ opacity:0; transform:translateY(20px); } to{ opacity:1; transform:translateY(0); } }
    .section-title{ display:flex; align-items:center; gap:10px; font-size:1.05rem; font-weight:600;
      margin-bottom:18px; color:var(--ink); padding-bottom:12px; border-bottom:1px solid var(--line); }

    .stats-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(72px,1fr)); gap:8px; margin-bottom:18px; }
    .stat-box{ background:transparent; padding:6px 4px; border:none; text-align:center; }
    .stat-val{ font-size:1.7rem; font-weight:700; color:var(--orange); display:block; margin-bottom:1px; }
    .stat-label{ font-size:.68rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.6px; font-weight:400; }

    /* Pairing — open rows + dividers, names flank score */
    .pairing-grid{ display:flex; flex-direction:column; }
    .pairing-item{ display:grid; grid-template-columns:30px minmax(0,1fr) auto minmax(0,1fr) 0;
      align-items:center; gap:4px 8px; background:transparent; border:none; padding:13px 0; border-radius:0; transition:.2s; }
    .pairing-item + .pairing-item{ border-top:1px solid var(--line2); }
    .pairing-item:hover{ background:rgba(255,255,255,.4); transform:none; }
    .table-badge{ font-weight:600; color:var(--ink-soft); background:transparent; padding:0;
      text-align:center; font-size:.56rem; }
    .player-wrap{ display:flex; align-items:center; gap:8px; font-weight:500; min-width:0; }
    .pairing-item>.player-wrap:nth-of-type(1){ justify-content:flex-end; }
    .pairing-item>.player-wrap:nth-of-type(2){ justify-content:flex-start; }
    .player-text{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:6px 9px;
      border-radius:10px; font-size:.85rem; min-width:0; }
    .player-text.winner{ background:#E3F3FF; color:#0B6BA8; font-weight:600; }
    .vs-text{ font-size:.7rem; font-weight:600; color:var(--ink-soft); text-align:center; }
    .score-badge{ background:transparent; padding:0 2px; font-family:'Mitr',sans-serif; font-weight:700;
      color:var(--ink); text-align:center; font-size:.82rem; white-space:nowrap; }
    .status-tag{ font-size:.62rem; font-weight:600; text-transform:uppercase; padding:4px 10px; border-radius:99px; justify-self:end; }
    .status-tag.pending{ background:rgba(217,119,6,.12); color:var(--warning); }
    .status-tag.completed{ background:rgba(11,107,168,.12); color:var(--success); }

    /* Standings table */
    table{ width:100%; border-collapse:collapse; min-width:560px; }
    th{ padding:11px 8px; color:var(--ink-soft); font-weight:500; font-size:.7rem; text-transform:uppercase;
      letter-spacing:.5px; border-bottom:1px solid var(--line); text-align:left; }
    td{ padding:12px 8px; border-bottom:1px solid var(--line2); color:var(--ink); font-weight:300; }
    tr:hover td{ background:rgba(255,255,255,.4); }

    .loading-overlay{ position:fixed; inset:0; background:var(--cream); z-index:9999;
      display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .spinner{ width:48px; height:48px; border:4px solid var(--orange-soft); border-top-color:var(--orange);
      border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin{ to{ transform:rotate(360deg); } }

    .modal-overlay{ display:none; position:fixed; inset:0; background:rgba(45,49,66,.45);
      backdrop-filter:blur(10px); z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.active{ display:flex; }
    .modal-card{ background:rgba(255,255,255,.92); border:1px solid var(--sun); border-radius:24px;
      padding:2.2rem; width:90%; max-width:430px; text-align:center; box-shadow:0 30px 70px -20px rgba(45,49,66,.5); }

    .gold{ color:#D4A017; } .platinum{ color:#0891B2; } .diamond{ color:#2563EB; } .grandmaster{ color:#7C3AED; }
    .codename.fire-breath{ background:linear-gradient(90deg,#FF8C42,#EF4444); -webkit-background-clip:text;
      background-clip:text; -webkit-text-fill-color:transparent; font-weight:700; }

    @media (max-width:768px){
      .app-container{ padding:14px 12px 40px; }
      .title-group h1{ font-size:1.7rem; }
      .tournament-card{ padding:16px 12px; border-radius:20px; }
      .status-tag{ display:none; }
      .pairing-item{ grid-template-columns:26px minmax(0,1fr) auto minmax(0,1fr); }
      .action-bar{ gap:8px; }
      .btn-action{ flex:1 1 auto; justify-content:center; }
      .back-home{ position:static; margin-bottom:10px; justify-content:center; }
      .stats-grid{ grid-template-columns:repeat(auto-fit,minmax(64px,1fr)); }
    }

</style>
</head>

<body>
  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <p style="margin-top: 1.5rem; font-weight: 600; letter-spacing: 1px;">PREPARING TOURNAMENT HUB...</p>
  </div>

  <div id="captureModal" class="modal-overlay">
    <div class="modal-card">
      <h2 style="margin-top: 0; font-weight: 800;">SHARE RESULTS</h2>
      <p style="color: var(--text-muted); margin-bottom: 2rem;">เลือกรูปแบบที่คุณต้องการบันทึกเป็นรูปภาพ</p>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <button class="btn-action primary" onclick="captureScreen('codename')">🎭 ผลการจับคู่ (โค้ดเนม)</button>
        <button class="btn-action warning" onclick="captureScreen('formal')">📝 ผลการจับคู่ (ทางการ)</button>
        <button class="btn-action success" onclick="captureScreen('standing')">📊 ตารางอันดับล่าสุด</button>
        <button class="btn-action" onclick="document.getElementById('captureModal').classList.remove('active')" style="margin-top: 1rem; opacity: 0.7;">ยกเลิก</button>
      </div>
    </div>
  </div>

  <div class="app-container">
    <header>
      <a href="https://uplevelguild.com" class="back-home">🔙 BACK TO HOME</a>
      <img src="https://i.postimg.cc/wjzpnxjB/Up-Level-01-1.png" alt="Up Level Guild" class="logo-main">
      <div class="title-group">
        <h1>Tournament Hub</h1>
        <p class="subtitle">Pokemon TCG Elite Tournament Pairing</p>
      </div>

      <div class="action-bar">
        <button class="btn-action primary" onclick="document.getElementById('captureModal').classList.add('active')">📸 SHARE RESULTS</button>
        <button id="formalToggleBtn" class="btn-action" onclick="toggleFormalMode()">🎭 SHOW AS CODENAME</button>
        <button class="btn-action success" onclick="loadData()">🔄 REFRESH DATA</button>
      </div>
    </header>

    <main>
      <section class="tournament-card">
        <div class="section-title">🏆 TOURNAMENT OVERVIEW</div>
        <div id="swiss-summary" class="stats-grid">
          <!-- Summary data injected here -->
        </div>
      </section>

      <div id="swiss-pairing-container">
        <!-- Paring cards injected here -->
      </div>

      <section class="tournament-card" id="standing-container">
        <div class="section-title">📊 ELITE STANDINGS</div>
        <div id="swiss-standings">
          <!-- Standings table injected here -->
        </div>
      </section>
    </main>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwVoGEvUEmeIkC-e2aPSrF7T82HqOpMwByW-SSbv7EohQ_zG2EbA2uv5TyPnqhuy5rmrg/exec';
    const MEMBER_API = "https://script.google.com/macros/s/AKfycbxtjsDwHI6nJU4OIHExUxMaZwUn3qwakvdkzwbQO7C8Trzz5Gh84SX6F1gqb4BOFQcn/exec?func=getMemberDashboardData";

    window.isFormalMode = false;
    window.pairingDataStore = null;
    window.phoneMap = null;
    window.playersData = null;

    const rankEmojis = {
      "Rookie": "🐣", "Bronze": "🛡️", "Silver": "⚔️", "Gold": "🥇",
      "Platinum": "✨", "Diamond": "💎", "Grandmaster": "👑", "Legend": "🐉"
    };

    function getBaseRank(rank) {
      if (!rank) return "Rookie";
      return rank.replace(/\s+(II|III|IV|V|VI|VII|VIII|IX|X|\d+)$/, '') || "Rookie";
    }

    function getRankEmoji(rank) {
      if (window.isFormalMode) return '';
      const base = getBaseRank(rank);
      return rankEmojis[base] || rankEmojis["Rookie"];
    }

    function extractRealName(name) {
      if (!name) return "";
      return name.replace(/^(?:th|TH|Th|tH)?\d+[_\s]*/, '').trim();
    }

    function renderCodenameEffect(codename, rank, phone = '') {
      if (window.isFormalMode) return "";
      if (String(phone).endsWith('971156555') || (codename && codename.toLowerCase() === 'champ')) {
        return `<span class="codename fire-breath">[MASTER CHAMPIONEST]</span>`;
      }
      return codename ? `<span class="codename">${codename}</span>` : "";
    }

    function toggleFormalMode() {
      window.isFormalMode = !window.isFormalMode;
      const btn = document.getElementById('formalToggleBtn');
      btn.innerHTML = window.isFormalMode ? '📝 SHOW AS FORMAL' : '🎭 SHOW AS CODENAME';
      renderAll(window.pairingDataStore, window.phoneMap);
    }

    function buildPhoneMap(members) {
      const map = {};
      members.forEach(m => {
        const phone = String(m.phone || m["Player Phone"] || m["Phone"] || "").replace(/\D/g, "");
        if (phone) map[phone] = { codename: m.codename || m["Codename"], rank: m.rank || m["Rank"] };
      });
      return map;
    }

    function getTelById(players, id) {
      const p = players.find(pd => String(pd[0]) === String(id));
      return p ? p[3] : null;
    }

    function renderSwissPairing(pairing, players, phoneMap) {
      if (!pairing || pairing.length <= 1) return "";
      const rounds = {};
      pairing.slice(1).forEach(row => {
        const r = row[0];
        if (!rounds[r]) rounds[r] = [];
        rounds[r].push(row);
      });

      const roundKeys = Object.keys(rounds).sort((a,b) => b-a);
      let html = "";
      roundKeys.forEach(r => {
        html += `<section class="tournament-card">
          <div class="section-title">📅 ROUND ${r} (${rounds[r].length} MATCHES)</div>
          <div class="pairing-grid">`;
        rounds[r].sort((a,b) => parseInt(a[1]) - parseInt(b[1])).forEach(row => {
          const table = row[1], p1Id = row[2], p2Id = row[8], result = row[10];
          const isBye = p2Id === 'BYE';
          const p1Tel = getTelById(players, p1Id), p2Tel = isBye ? "" : getTelById(players, p2Id);
          const p1Phone = String(p1Tel || "").replace(/\D/g,""), p2Phone = String(p2Tel || "").replace(/\D/g,"");
          const p1Data = phoneMap[p1Phone] || {}, p2Data = phoneMap[p2Phone] || {};
          const isDone = !!result && result !== '- : -';

          if (isBye) {
            html += `<div class="pairing-item">
              <div class="table-badge">${table}</div>
              <div class="player-wrap"><span class="player-text">${p1Id.toString().replace(/\D/g,'')}. ${getRankEmoji(p1Data.rank)} ${window.isFormalMode ? extractRealName(row[3]) : renderCodenameEffect(p1Data.codename, p1Data.rank, p1Phone) || extractRealName(row[3])}</span></div>
              <div class="vs-text">VS</div><div class="player-wrap"><span class="player-text">🎯 BYE</span></div>
              <div class="status-tag completed">WIN BYE</div>
            </div>`;
          } else {
            html += `<div class="pairing-item">
              <div class="table-badge">${table}</div>
              <div class="player-wrap"><span class="player-text ${result === '1:0' ? 'winner' : ''}">${p1Id.toString().replace(/\D/g,'')}. ${getRankEmoji(p1Data.rank)} ${window.isFormalMode ? extractRealName(row[3]) : renderCodenameEffect(p1Data.codename, p1Data.rank, p1Phone) || extractRealName(row[3])}</span></div>
              <div class="score-badge">${result || '- : -'}</div>
              <div class="player-wrap"><span class="player-text ${result === '0:1' ? 'winner' : ''}">${p2Id.toString().replace(/\D/g,'')}. ${getRankEmoji(p2Data.rank)} ${window.isFormalMode ? extractRealName(row[9]) : renderCodenameEffect(p2Data.codename, p2Data.rank, p2Phone) || extractRealName(row[9])}</span></div>
              <div class="status-tag ${isDone ? 'completed' : 'pending'}">${isDone ? 'Finished' : 'Waiting'}</div>
            </div>`;
          }
        });
        html += `</div></section>`;
      });
      return html;
    }

    function renderStandings(standings, players, phoneMap) {
      if (!standings || !document.getElementById('standing-container') || standings.length <= 1) return "";
      let html = `<table><thead><tr><th>Rank</th><th>Elite Player</th><th>Pts</th><th>W/L/D</th><th>%W</th><th>%OW</th></tr></thead><tbody>`;
      standings.slice(1).forEach(row => {
        const isDropped = row[0] === 'DROP';
        const pId = row[1];
        const pTel = getTelById(players, pId);
        const phone = String(pTel || "").replace(/\D/g,"");
        const pData = phoneMap[phone] || {};
        const name = window.isFormalMode ? extractRealName(row[2]) : (pData.codename || extractRealName(row[2]));

        html += `<tr style="${isDropped ? 'opacity: 0.5; font-style: italic;' : ''}">
          <td style="font-weight: 800; color: ${isDropped ? 'var(--text-muted)' : 'var(--accent)'}">${row[0]}</td>
          <td><div style="font-weight:600;">${getRankEmoji(pData.rank)} ${name}</div><div style="font-size:0.7rem; color:var(--text-muted);">ID: ${pId}</div></td>
          <td style="font-weight: 800; color: #fff;">${row[8]}</td>
          <td style="font-size: 0.85rem;">${row[5]}/${row[7]}/${row[6]}</td>
          <td style="font-weight: 600;">${row[9]}</td>
          <td style="font-size: 0.8rem; color: var(--text-muted);">${row[10]}</td>
        </tr>`;
      });
      return html + `</tbody></table>`;
    }

    function renderSummary(pairing, standings) {
      const rounds = new Set(pairing.slice(1).map(r => r[0])).size;
      const completed = pairing.slice(1).filter(r => !!r[10] && r[10] !== '- : -').length;
      return `<div class="stat-box"><span class="stat-val">${standings.length - 1}</span><span class="stat-label">Players</span></div>
              <div class="stat-box"><span class="stat-val">${rounds}</span><span class="stat-label">Rounds</span></div>
              <div class="stat-box"><span class="stat-val">${completed}</span><span class="stat-label">Matches</span></div>`;
    }

    function renderAll(d, phoneMap) {
      if (!d) return;
      document.getElementById('swiss-summary').innerHTML = renderSummary(d.pairing, d.standings);
      document.getElementById('swiss-pairing-container').innerHTML = renderSwissPairing(d.pairing, d.players, phoneMap);
      document.getElementById('swiss-standings').innerHTML = renderStandings(d.standings, d.players, phoneMap);
    }

    async function loadData() {
      document.getElementById('loading').style.display = 'flex';
      try {
        const [pRes, mRes] = await Promise.all([fetch(API_URL), fetch(MEMBER_API)]);
        const pd = await pRes.json();
        const md = await mRes.json();
        window.pairingDataStore = pd;
        window.playersData = pd.players;
        window.phoneMap = buildPhoneMap(md);
        renderAll(pd, window.phoneMap);
      } catch (e) {
        console.error(e);
        alert("Fail to load tournament data. please try again.");
      }
      document.getElementById('loading').style.display = 'none';
    }

    function captureScreen(mode) {
      document.getElementById('captureModal').classList.remove('active');
      const target = (mode === 'standing') ? document.getElementById('standing-container') : document.getElementById('swiss-pairing-container');
      
      html2canvas(target, { backgroundColor: '#0f172a', scale: 2 }).then(canvas => {
        const link = document.createElement('a');
        link.download = `Tournament-${mode}-${new Date().getTime()}.png`;
        link.href = canvas.toDataURL();
        link.click();
      });
    }

    loadData();
  </script>
</body>
</html>
