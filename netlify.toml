[build]
  publish = "."
  functions = "netlify/functions"

# /lorcana-weekly goes through the function: bots get live OG, browsers
# get the real static page (loopback-fetched from /lorcana-weekly.html).
[[redirects]]
  from = "/lorcana-weekly"
  to = "/.netlify/functions/lorcana-weekly"
  status = 200
  force = true

# Legacy share alias — keep working in case anyone already pasted it
[[redirects]]
  from = "/share"
  to = "/.netlify/functions/share"
  status = 200
  force = true

[[redirects]]
  from = "/share/*"
  to = "/.netlify/functions/share"
  status = 200
  force = true

# HQ moved to uplevelguild.com (2026-06-18)
[[redirects]]
  from = "/"
  to = "https://uplevelguild.com"
  status = 302
  force = true

[[redirects]]
  from = "/index.html"
  to = "https://uplevelguild.com"
  status = 302
  force = true

# Block sensitive root files from public serving (publish="." exposes repo root) — 2026-06-18
[[redirects]]
  from = "/service-account.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/lorcana_day_app_script.gs"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/lorcana_day_pairing_app_script.gs"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/Up Level Guild Data.xlsx"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/Up%20Level%20Guild%20Data.xlsx"
  to = "/404.html"
  status = 404
  force = true
